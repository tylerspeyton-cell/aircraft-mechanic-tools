<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 130 40" width="130" height="40">
  <defs>
    <linearGradient id="badge" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0284c7"/>
    </linearGradient>
  </defs>

  <!-- Badge background -->
  <rect x="0" y="2" width="36" height="36" rx="9" fill="url(#badge)"/>

  <!-- Airplane (top-down silhouette) centered in badge -->
  <g transform="translate(18, 20)">
    <!-- Fuselage -->
    <ellipse cx="0" cy="0" rx="2.5" ry="12" fill="white"/>
    <!-- Main wings -->
    <path d="M-2,-2 L-14,6 L-14,9 L0,4 L14,9 L14,6 L2,-2Z" fill="white" opacity="0.95"/>
    <!-- Tail fins -->
    <path d="M-1.5,9 L-7,15 L-6,15.5 L0,11.5 L6,15.5 L7,15 L1.5,9Z" fill="white" opacity="0.75"/>
    <!-- Cockpit window -->
    <ellipse cx="0" cy="-7" rx="1.5" ry="2.5" fill="#38bdf8" opacity="0.6"/>
  </g>

  <!-- AMT text -->
  <text x="44" y="27" font-family="'Plus Jakarta Sans', 'Inter', system-ui, sans-serif" font-size="18" font-weight="800" fill="#eaeeff" letter-spacing="1">AMT</text>

  <!-- Accent underline -->
  <rect x="44" y="31" width="36" height="2" rx="1" fill="#fb923c" opacity="0.85"/>
</svg>
