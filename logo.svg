<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 230 48" width="230" height="48">
  <defs>
    <linearGradient id="badge" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0284c7"/>
    </linearGradient>
  </defs>

  <!-- Badge -->
  <rect x="0" y="2" width="40" height="44" rx="10" fill="url(#badge)"/>

  <!-- Airplane (top-down silhouette) -->
  <g transform="translate(20, 24)">
    <!-- Fuselage -->
    <ellipse cx="0" cy="0" rx="2.5" ry="13" fill="white"/>
    <!-- Main wings -->
    <path d="M-2,-2 L-15,7 L-15,10 L0,5 L15,10 L15,7 L2,-2Z" fill="white" opacity="0.92"/>
    <!-- Tail fins -->
    <path d="M-1.5,10 L-7,16 L-6,16.5 L0,13 L6,16.5 L7,16 L1.5,10Z" fill="white" opacity="0.72"/>
    <!-- Cockpit -->
    <ellipse cx="0" cy="-8" rx="1.5" ry="2.5" fill="#38bdf8" opacity="0.55"/>
  </g>

  <!-- AMT -->
  <text x="52" y="22" font-family="'Space Grotesk', 'Inter', system-ui, sans-serif" font-size="17" font-weight="700" fill="#eaeeff" letter-spacing="1.5">AMT</text>

  <!-- Tagline -->
  <text x="53" y="36" font-family="'Space Grotesk', 'Inter', system-ui, sans-serif" font-size="9" font-weight="500" fill="#8d93be" letter-spacing="0.5">Aviation Maintenance Tool</text>

  <!-- Accent line under AMT -->
  <rect x="52" y="26" width="38" height="1.5" rx="1" fill="#fb923c" opacity="0.75"/>
</svg>
